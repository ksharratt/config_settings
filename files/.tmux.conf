# ---- Prefix ----
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---- Copy mode ----
setw -g mode-keys vi
bind -n PageUp copy-mode -u
bind -n PageDown send-keys -X page-down

# ---- Window naming ----
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ---- Logging ----
set -g @logging-path        "$HOME/tmux-logs"
set -g @logging-filename    "#{session_name}-#{window_index}-#{pane_index}-%Y%m%d-%H%M%S.log"
set -g @screen-capture-path "$HOME/tmux-logs"

# Auto-start logging on every new pane (color codes stripped automatically by plugin)
set-hook -g after-new-session  'run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'
set-hook -g after-new-window   'run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'
set-hook -g after-split-window 'run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-logging'

run '~/.tmux/plugins/tpm/tpm'
