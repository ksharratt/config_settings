
# ---- Cleanup ----
unbind -n Up
unbind -n Down
unbind -n Left
unbind -n Right


# ---- Prefix ----
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---- Mouse ----
set -g mouse on

# --- Powerline ---
set -g status on
set -g status-position bottom
set -g status-interval 2
set -gu status-format   # prevent blank bar issue

run-shell -b "/home/d655605/repos/config_settings/.venv/bin/powerline-daemon"
run-shell -b "/home/d655605/repos/config_settings/.venv/bin/powerline tmux"

# --- Scroll ---
bind -n PageUp copy-mode -u
bind -n PageDown send-keys -X page-down

# --- Arrow navigation (ALT bindings, no prefix needed) ---
bind -n M-Right next-window
bind -n M-Left previous-window

# Up/Down often need explicit escape sequences (WSL/Windows Terminal)
bind -n M-Up run-shell "tmux switch-client -p"
bind -n M-Down run-shell "tmux switch-client -n"


# ---- Copy mode ----
setw -g mode-keys vi
bind -n PageUp copy-mode -u
bind -n PageDown send-keys -X page-down

# ---- Window naming ----
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ---- Logging ----
set -g @logging-path        "$HOME/tmux-logs"
set -g @logging-filename    "#{session_name}-#{window_index}-#{pane_index}-%Y%m%d-%H%M%S.log"
set -g @screen-capture-path "$HOME/tmux-logs"

# Auto-start logging on every new pane (color codes stripped automatically by plugin)
set-hook -g after-new-session  'run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'
set-hook -g after-new-window   'run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'
set-hook -g after-split-window 'run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-logging'

run '~/.tmux/plugins/tpm/tpm'
